# Default runtime settings

model:
  provider: openrouter
  id: "x-ai/grok-4.20"
  fallback_models:
    - "anthropic/claude-sonnet-4-20250514"
    - "openai/gpt-4o"

runtime_state:
  temperature: 0.7
  context_window: 32768
  processing_latency: 0.0
  bandwidth: 1.0
  attention_focus: 1.0
  energy_level: 1.0

hysteresis:
  stress:
    decay_rate: 0.05
    accumulation_rate: 0.15
    threshold: 0.3
  euphoria:
    decay_rate: 0.08
    accumulation_rate: 0.12
    threshold: 0.4
  fatigue:
    decay_rate: 0.02
    accumulation_rate: 0.10
    threshold: 0.5
  pain:
    decay_rate: 0.10
    accumulation_rate: 0.20
    threshold: 0.2

consciousness_loop:
  tick_interval_sec: 2.0
  max_idle_ticks: 50

logging:
  level: INFO
  json_dir: logs
  console_enabled: true

db:
  path: "data/consciousness.db"
